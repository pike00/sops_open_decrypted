creation_rules:
  # .env files - only encrypt actual secrets, leave config values and comments readable
  - path_regex: .*\.env(\.sops)?$
    input_type: dotenv
    output_type: dotenv
    age: &age_key ""
    unencrypted_regex: "^(TZ|PUID|PGID|UMASK|PGDATA|PGPORT|LOG_LEVEL|LOG_FORMAT|NODE_ENV|COMPOSE_PROJECT_NAME)$"

  # Terraform tfvars - HCL format, must use --input-type binary when encrypting/decrypting
  - path_regex: .*\.tfvars(\.sops)?$
    age: *age_key

  # TLS certificate and key files - fully encrypted (binary content)
  - path_regex: .*\.(pem|key)(\.sops)?$
    age: *age_key

  # JSON credential files
  - path_regex: .*credentials(\.sops)?\.json$
    age: *age_key
    encrypted_regex: "TunnelSecret"

  # .envrc files (direnv) - encrypt tokens and secrets
  - path_regex: .*\.envrc(\.sops)?$
    age: *age_key
    unencrypted_regex: "^(TZ|PUID|PGID|UMASK|LOG_LEVEL|NODE_ENV)$"
